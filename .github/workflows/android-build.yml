name: 手动构建慧语电子票据 APK

# 触发器：仅允许手动运行
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 JDK 环境
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Gradle
      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. 授予 gradlew 脚本可执行权限
      - name: 授予Gradle可执行权限
        run: chmod +x gradlew

      # 5. 使用 Gradle 编译 Debug APK
      - name: 构建 Debug APK
        run: ./gradlew assembleDebug

      # 6. 上传生成的 APK 文件到工作流运行记录
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 慧语电子票据-APK
          path: app/build/outputs/apk/debug/app-debug.apk

name: 手动构建慧语电子票据 APK

# 仅允许手动触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 下载官方 Gradle Wrapper 脚本和 JAR（确保文件有效）
      - name: 修复 Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.1.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.1.0/gradlew -o gradlew
          chmod +x gradlew
          # 可选：也生成 gradlew.bat（非必要）
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.1.0/gradlew.bat -o gradlew.bat

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 慧语电子票据-APK
          path: app/build/outputs/apk/debug/app-debug.apk

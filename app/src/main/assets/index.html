<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>慧语电子票据</title>
    <script src="js/html2canvas.min.js"></script>
    <script src="js/jspdf.umd.min.js"></script>
    <style>
        :root {
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        * {
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #eef2f5;
            font-family: 'Segoe UI', 'PingFang SC', '微软雅黑', Roboto, sans-serif;
            margin: 0;
            padding: 10px 6px 30px 6px;
            /* 关键：允许横向滚动，所有子元素统一固定宽度 */
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(30px + var(--safe-area-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 统一固定宽度 – 与 A4 纸张一致，手机也不挤压 */
        .invoice-container,
        .control-panel,
        .btn-group {
            width: 210mm;
            min-width: 210mm;
            max-width: 210mm;
        }

        .invoice-container {
            position: relative;
            background: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-radius: 20px;
            padding: 12mm 10mm 15mm 10mm;
            margin-bottom: 16px;
            overflow: visible;
            user-select: none;
            -webkit-user-select: none;
        }
        .normal-content { display: block; }
        .image-mode-container {
            display: none;
            background: #e8e8e8;
            border-radius: 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80px;
        }
        .image-mode-container canvas {
            display: block;
            margin: 0 auto;
            cursor: default;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.12);
            background: #fff;
            max-width: 100%;
            height: auto;
        }
        .image-mode-container .brand-overlay,
        .image-mode-container .company-stamp {
            position: absolute;
            z-index: 30;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: inline-block;
        }
        .image-mode-container .brand-overlay.dragging,
        .image-mode-container .company-stamp.dragging { cursor: grabbing; }
        .image-control-bar-external {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.65);
            padding: 6px 12px;
            border-radius: 40px;
            flex-wrap: wrap;
        }
        .image-control-bar-external button {
            background: white;
            border: none;
            padding: 5px 12px;
            border-radius: 32px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            touch-action: manipulation;
        }
        .watermark-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10000;
            background-repeat: repeat;
            background-size: 220px 220px;
            opacity: 0.25;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .brand-overlay {
            position: absolute;
            z-index: 20;
            cursor: grab;
            height: auto;
            object-fit: contain;
            border-radius: 6px;
            opacity: 0.9;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .brand-overlay.dragging,
        .company-stamp.dragging { cursor: grabbing; opacity: 0.7; }
        .company-stamp {
            position: absolute;
            object-fit: contain;
            opacity: 0.85;
            z-index: 9999;
            cursor: grab;
            background: transparent;
            pointer-events: auto;
            touch-action: none;
            left: auto; top: auto; right: auto; bottom: auto;
            display: none;
        }
        .sign-line {
            font-size: 14px; padding: 4px 8px; white-space: nowrap;
        }
        .control-panel {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            margin-bottom: 12px;
            border: 1px solid #e2edf2;
            overflow: hidden;
        }
        .tab-buttons {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2edf2;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: transparent;
            border: none;
            font-size: 13px;
            font-weight: 600;
            color: #4a627a;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }
        .tab-btn.active { color: #2c7da0; border-bottom-color: #2c7da0; background: white; }
        .tab-pane { display: none; padding: 24px; }
        .tab-pane.active-pane { display: block; }
        .info-edit-panel { display: flex; flex-wrap: wrap; gap: 16px 20px; align-items: flex-end; }
        .info-field { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 6px; }
        .info-field label { font-size: 14px; font-weight: 600; color: #4a627a; }
        .info-field input { padding: 10px 14px; border-radius: 12px; border: 1px solid #cddfe7; font-size: 14px; width: 100%; }
        .add-remove-panel { display: flex; flex-direction: column; gap: 24px; }
        .add-goods-form { background: #fefcf5; border-radius: 20px; padding: 20px; border: 1px solid #e9e5d5; }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .form-field { flex: 1; min-width: 100px; }
        .form-field label { font-size: 14px; font-weight: 600; color: #4a627a; display: block; margin-bottom: 4px; }
        .form-field input, .form-field select { width: 100%; padding: 10px 14px; border-radius: 32px; border: 1px solid #cddfe7; font-size: 14px; }
        .add-btn { background: #2c7da0; color: white; border: none; padding: 10px 24px; border-radius: 32px; font-weight: bold; cursor: pointer; height: 42px; display: inline-flex; align-items: center; white-space: nowrap; }
        .action-buttons { background: #fefcf5; border-radius: 20px; padding: 20px; border: 1px solid #e9e5d5; display: flex; gap: 20px; }
        .btn-group-row { flex: 1; display: flex; flex-direction: column; gap: 12px; background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #edf2f7; }
        .btn-group-title { font-size: 14px; font-weight: 700; color: #2c7da0; border-left: 3px solid #2c7da0; padding-left: 10px; margin-bottom: 4px; }
        .btn-sm { background: #2c7da0; color: white; border: none; padding: 8px 20px; border-radius: 32px; font-weight: bold; cursor: pointer; }
        .btn-sm-danger { background: #bc6c25; }
        .action-icon-btn { background: #eef2f7; border: 1px solid #cbd5e1; color: #1e4663; font-size: 14px; font-weight: 600; padding: 6px 16px; border-radius: 32px; cursor: pointer; }
        .disabled { opacity: 0.5; pointer-events: none; }
        .table-wrapper { overflow-x: auto; border: 2px solid #1e2f3a; background: #fff; margin-top: 8px; }
        .sales-table { width: 100%; border-collapse: collapse; font-size: 14px; font-family: 'Consolas','PingFang SC', monospace; min-width: 500px; }
        .sales-table th, .sales-table td { border: 2px solid #1e2f3a; padding: 8px 6px; text-align: center; }
        .sales-table th { background: #e6eaef; font-weight: 800; }
        .clickable-seq { cursor: pointer; background: #f0f7ff; font-weight: 600; }
        .total-row { margin-top: 16px; display: flex; justify-content: space-between; padding: 10px 15px; border-radius: 12px; background: #f8f9fc; }
        .amount-chinese { font-weight: 700; color: #1e4663; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin: 20px auto 10px; }
        .btn-group button { border: none; color: white; font-size: 18px; font-weight: bold; padding: 14px 32px; border-radius: 56px; cursor: pointer; }
        #saveAsImageBtn { background: #2c7da0; }
        #downloadPdfBtn { background: #d9534f; }
        #printBtn { background: #5f6c7a; }
        .toast-msg { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 22px; border-radius: 24px; z-index: 99999; opacity: 0; transition: 0.3s; }
        .toast-msg.show { opacity: 1; }

        @media print {
            body { background: white; }
            .btn-group, .control-panel { display: none; }
        }
    </style>
</head>
<body>
<div class="invoice-container" id="invoiceContainer">
    <div class="normal-content" id="normalContent">
        <img id="brandImage" class="brand-overlay" src="" alt="品牌图" style="display:none;">
        <img id="companyStamp" class="company-stamp" src="" alt="公司章" style="display:none;">

        <div class="header-info" style="text-align:center; margin-bottom:12px;">
            <div class="company-title" style="font-size:24px; font-weight:800; color:#0b3b4f;">XXX科技有限公司销售单</div>
            <div style="font-size:13px; color:#2c3e50;">联系电话：000-000000 | 联系人：某某某</div>
        </div>
        <div style="border-bottom:2px solid #1a4d6b; margin-bottom:12px;"></div>
        <div style="display:flex; justify-content:space-between; background:#f4f7fa; padding:8px 15px; border-radius:12px; margin:12px 0; border:1px solid #bac8d3;">
            <span><strong>收货单位：</strong><span id="customerNameDisplay">XXX单位</span></span>
            <span><strong>开单日期：</strong><span id="headerInvoiceDate"></span></span>
        </div>
        <div class="table-wrapper">
            <table class="sales-table" id="salesTable">
                <thead><tr><th style="width:45px">序号</th><th>名称</th><th style="width:60px">单位</th><th style="width:70px">数量</th><th style="width:100px">单价(元)</th><th style="width:90px">金额(元)</th><th>备注/类别</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="total-row">
            <span><strong>合计(大写):</strong> <span id="amountCN" class="amount-chinese">零元整</span></span>
            <span style="font-size:20px; color:#c0392b;">￥ <span id="amountTotal">0.00</span></span>
        </div>
        <div id="remarkBox" style="background:#f8f9fc; padding:8px 15px; border-radius:12px; margin:14px 0; display:flex; align-items:center;">
            <strong>备注：</strong> <span id="remarkText">祝你生活愉快，感谢您的支持与信任！</span>
            <button id="editRemarkBtn" style="margin-left:auto; background:transparent; border:1px solid #e2b87a; color:#b45f1b; border-radius:40px; padding:3px 10px; cursor:pointer;">✎ 编辑</button>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:24px; border-top:2px solid #3c5a6f; padding-top:16px;">
            <span id="signerName">制单人：某某某</span>
            <span style="font-size:12px; text-align:center; color:#4a5568;">本销售单盖章有效 | 电子单据与纸质同等效力</span>
            <span><strong>单据编号：</strong><span id="invoiceNo"></span></span>
        </div>
    </div>

    <div class="image-mode-container" id="imageModeContainer">
        <canvas id="imageCanvas"></canvas>
    </div>
    <div id="imageControlBarExternal" style="display:none;" class="image-control-bar-external">
        <button id="rotateLeftBtn">↺ 左转90°</button>
        <button id="rotateRightBtn">↻ 右转90°</button>
        <button id="closeImageModeBtn" style="background:#d9534f; color:white;">✕ 关闭图片</button>
    </div>
</div>

<div class="control-panel" id="controlPanel">
    <div class="tab-buttons">
        <button class="tab-btn active" data-tab="basic">基本资料</button>
        <button class="tab-btn" data-tab="edit">添加删除</button>
        <button class="tab-btn" data-tab="image">商标管理</button>
        <button class="tab-btn" data-tab="batch">批量解析</button>
    </div>

    <!-- 基本资料 -->
    <div class="tab-pane active-pane" id="tab-basic">
        <div class="info-edit-panel">
            <div class="info-field"><label>🏢 公司名称</label><input id="editCompany" value="XXX科技有限公司销售单"></div>
            <div class="info-field"><label>📞 联系电话</label><input id="editPhone" value="000-000000"></div>
            <div class="info-field"><label>👤 联系人</label><input id="editContact" value="某某某"></div>
            <div class="info-field"><label>✍️ 制单人</label><input id="editSigner" value="某某某"></div>
            <div class="info-field"><label>🏪 收货单位</label><input id="editCustomer" value="XXX单位"></div>
        </div>
    </div>

    <!-- 添加删除 -->
    <div class="tab-pane" id="tab-edit">
        <div class="add-goods-form">
            <div class="form-row">
                <div class="form-field"><label>商品名称</label><input id="prodName" placeholder="请输入商品名称"></div>
                <div class="form-field"><label>单位</label><input id="prodUnit" value="个"></div>
                <div class="form-field"><label>数量</label><input type="number" id="prodQty" value="1" step="any" min="0.01"></div>
                <div class="form-field"><label>单价(元)</label><input type="number" id="prodPrice" value="0.00" step="0.01" min="0"></div>
            </div>
            <div class="form-row" style="margin-top:8px;">
                <div class="form-field"><label>备注</label><input id="prodRemark" placeholder="可选"></div>
                <div class="form-field" style="flex:0 0 auto;"><button id="addItemBtn" class="add-btn">➕ 添加商品</button></div>
            </div>
        </div>
        <div class="action-buttons" style="margin-top:16px;">
            <div class="btn-group-row">
                <div class="btn-group-title">✏️ 编辑当前选中商品</div>
                <button id="loadEditBtn" class="action-icon-btn">📋 加载选中</button>
                <button id="saveEditBtn" class="btn-sm">💾 保存修改</button>
            </div>
            <div class="btn-group-row">
                <div class="btn-group-title">🔁 调整顺序</div>
                <button id="moveUpBtn" class="action-icon-btn">↑ 上移</button>
                <button id="moveDownBtn" class="action-icon-btn">↓ 下移</button>
            </div>
            <div class="btn-group-row">
                <div class="btn-group-title">🗑️ 删除操作</div>
                <button id="deleteSelectedBtn" class="action-icon-btn danger">删除选中</button>
                <button id="clearAllBtn" class="btn-sm btn-sm-danger">清空全部</button>
            </div>
        </div>
    </div>

    <!-- 商标管理（完整功能） -->
    <div class="tab-pane" id="tab-image">
        <div style="margin-bottom:16px; font-weight:500; font-size:14px;">📎 手指拖拽可移动图片，图片自动保存（离线缓存）</div>
        <div class="img-manager-group" style="display:flex; flex-direction:column; gap:24px;">
            <div style="background:#f9fafb; padding:16px 20px; border-radius:20px; border:1px solid #e2edf2;">
                <div style="font-weight:600; margin-bottom:8px;">🏢 品牌图</div>
                <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
                    <button id="uploadBrandBtn" class="btn-sm" style="background:#5f6c7a;">上传</button>
                    <button id="removeBrandBtn" class="btn-sm" style="background:#bc6c25;">移除</button>
                    <div class="size-control" style="display:flex; align-items:center; gap:8px;">
                        <span>宽(px):</span>
                        <input type="number" id="brandWidth" value="120" step="10" min="30" max="400" style="width:70px;">
                    </div>
                    <button id="applyBrandSize" class="action-icon-btn">应用</button>
                </div>
                <input type="file" id="brandInput" accept="image/*" style="display:none;">
            </div>
            <div style="background:#f9fafb; padding:16px 20px; border-radius:20px; border:1px solid #e2edf2;">
                <div style="font-weight:600; margin-bottom:8px;">🖼️ 公司章</div>
                <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
                    <button id="uploadStampBtn" class="btn-sm" style="background:#5f6c7a;">上传</button>
                    <button id="removeStampBtn" class="btn-sm" style="background:#bc6c25;">移除</button>
                    <div class="size-control" style="display:flex; align-items:center; gap:8px;">
                        <span>宽(px):</span>
                        <input type="number" id="stampWidth" value="150" step="10" min="50" max="500" style="width:70px;">
                    </div>
                    <button id="applyStampSize" class="action-icon-btn">应用</button>
                </div>
                <input type="file" id="stampInput" accept="image/*" style="display:none;">
            </div>
            <div style="background:#eef7ff; padding:16px 20px; border-radius:20px; border:2px dashed #2c7da0;">
                <div style="font-weight:600;">🖼️ 导入背景图（自动适应宽度，可旋转）</div>
                <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-top:8px;">
                    <button id="importFullImageBtn" class="btn-sm" style="background:#2c7da0;">📂 导入图片</button>
                    <span style="font-size:12px; color:#666;">旋转后品牌图/公司章自动居中</span>
                </div>
                <input type="file" id="fullImageInput" accept="image/*" style="display:none;">
            </div>
        </div>
        <div style="margin-top:12px; font-size:11px; color:#888;">💡 点击移除会清除缓存。</div>
    </div>

    <!-- 批量解析 -->
    <div class="tab-pane" id="tab-batch">
        <div style="background:#f9fafb; border-radius:20px; padding:20px; border:1px solid #e2edf2;">
            <div style="font-weight:700; font-size:16px; color:#1e4663; margin-bottom:16px;">🧠 精准批量解析</div>
            <textarea id="batchRawInput" rows="5" style="width:100%; border-radius:16px; border:1px solid #cbd5e1; padding:14px; font-family:monospace; font-size:14px; min-height:120px;" placeholder="输入商品行，例如：智能平板 3 台 2499"></textarea>
            <div id="parsePreview" style="margin-top:16px; max-height:200px; overflow-y:auto; background:white; border-radius:16px; padding:12px;"></div>
            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;">
                <button id="parseBtn" class="btn-outline">🔍 智能解析预览</button>
                <button id="confirmAddBatchBtn" class="btn-sm">✓ 确认添加全部</button>
            </div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button id="saveAsImageBtn">📷 保存为图片</button>
    <button id="downloadPdfBtn">📄 下载 PDF</button>
    <button id="printBtn">🖨️ 打印销售单</button>
</div>

<script>
    // ==================== Android Bridge ====================
    const isAndroidApp = typeof AndroidBridge !== 'undefined' && AndroidBridge !== null;
    function showToast(msg) {
        if (isAndroidApp) { try { AndroidBridge.showToast(msg); } catch(e) {} }
        let toast = document.getElementById('globalToast');
        if (!toast) {
            toast = document.createElement('div'); toast.id = 'globalToast'; toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg; toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }
    function saveFileNative(base64, name, mime) {
        if (isAndroidApp) { try { AndroidBridge.saveFile(base64, name, mime); return true; } catch(e) {} }
        return false;
    }
    function printNative(base64) {
        if (isAndroidApp) { try { AndroidBridge.printBase64(base64); return true; } catch(e) {} }
        return false;
    }

    // ==================== 水印 ====================
    let lastWatermark = localStorage.getItem('lastWatermark_v2') || '';
    function askWatermark() {
        return new Promise(resolve => {
            if (!confirm('是否添加防伪水印？')) { resolve(null); return; }
            let def = lastWatermark || 'XX公司收款专用2026';
            let inp = prompt('水印文字（最多18字）', def);
            if (!inp) { resolve(null); return; }
            let t = inp.trim();
            if (!t) { alert('水印不能为空'); resolve(null); return; }
            if (t.length > 18) { alert('最多18个字符'); resolve(null); return; }
            localStorage.setItem('lastWatermark_v2', t);
            lastWatermark = t;
            resolve(t);
        });
    }
    function createWatermarkDataURL(text) {
        let c = document.createElement('canvas'), s = 200;
        c.width = s; c.height = s;
        let ctx = c.getContext('2d');
        ctx.font = 'bold 18px "PingFang SC","微软雅黑"';
        ctx.fillStyle = '#7f8c8d';
        ctx.translate(s/2, s/2);
        ctx.rotate(-0.5);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 0, 0);
        return c.toDataURL();
    }

    // ==================== 数据 ====================
    let items = [], selectedIndex = -1;
    const UNITS = new Set(['个','台','套','根','件','只','条','支','箱','包','瓶','盒','桶','双','对','米','千克','公斤','克','升','毫升','袋','卷','组','部','块','片','张','把','粒','罐','打','份','册','本','辆','架','顶','副','串','捆','扎','排','座','栋','扇','盏','枚']);
    function save() {
        try {
            localStorage.setItem('invoiceData_v2', JSON.stringify({
                items, selectedIndex,
                company: editCompany.value, phone: editPhone.value,
                contact: editContact.value, signer: editSigner.value,
                customer: editCustomer.value, remark: remarkText.innerText
            }));
        } catch(e){}
    }
    function load() {
        let d = localStorage.getItem('invoiceData_v2');
        if (!d) return false;
        try {
            d = JSON.parse(d);
            items = d.items || []; selectedIndex = d.selectedIndex ?? -1;
            editCompany.value = d.company || ''; editPhone.value = d.phone || '';
            editContact.value = d.contact || ''; editSigner.value = d.signer || '';
            editCustomer.value = d.customer || ''; remarkText.innerText = d.remark || '';
            syncInfo(); renderTable(); return true;
        } catch(e) { return false; }
    }
    function syncInfo() {
        document.querySelector('.company-title').innerText = editCompany.value || '销售单';
        document.querySelector('.sub-title') && (document.querySelector('.sub-title').innerHTML = `联系电话：${editPhone.value} | 联系人：${editContact.value}`);
        signerName.innerText = '制单人：' + (editSigner.value || '');
        customerNameDisplay.innerText = editCustomer.value || '';
        save();
    }
    function setMeta() {
        let now = new Date(), y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
        headerInvoiceDate.innerText = `${y}-${m}-${d} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        invoiceNo.innerText = `XS-${y}${m}${d}-${Math.floor(Math.random()*1000)}`;
    }
    function renderTable() {
        let tbody = tableBody; tbody.innerHTML = '';
        if (!items.length) {
            selectedIndex = -1;
            let row = tbody.insertRow(); row.insertCell().colSpan = 7;
            row.cells[0].style.textAlign = 'center'; row.cells[0].innerText = '✨ 暂无商品';
            updateTotal(); save(); return;
        }
        items.forEach((it, idx) => {
            let row = tbody.insertRow();
            if (idx === selectedIndex) row.classList.add('selected-row');
            row.insertCell().innerHTML = `<span class="clickable-seq" style="display:block;">${idx+1}</span>`;
            row.querySelector('.clickable-seq').onclick = (e) => { selectedIndex = idx; renderTable(); };
            row.insertCell().innerText = it.name;
            row.insertCell().innerText = it.unit;
            row.insertCell().innerText = it.qty;
            row.insertCell().innerText = it.price.toFixed(2);
            row.insertCell().innerText = (it.qty * it.price).toFixed(2);
            row.insertCell().innerText = it.remark || '';
        });
        updateTotal(); save();
    }
    function updateTotal() {
        let sum = items.reduce((s, i) => s + i.qty * i.price, 0);
        amountTotal.innerText = sum.toFixed(2);
        amountCN.innerHTML = (function(m) {
            if (isNaN(m)) return '零元整';
            let digit = '零壹贰叁肆伍陆柒捌玖', units = ['','拾','佰','仟'], big = ['元','万','亿'];
            let s = '', p = 0, int = Math.floor(m);
            while (int > 0) {
                let part = int % 10000, partStr = '', q = 0, tmp = part;
                while (tmp > 0) { let cur = tmp % 10; partStr = (cur ? digit[cur] + units[q] : partStr && partStr[0]!=='零' ? '零'+partStr : partStr); tmp = Math.floor(tmp / 10); q++; }
                if (part < 1000 && p > 0 && s && s[0]!=='零') partStr = '零' + partStr;
                s = partStr + (p===0?'':big[p]) + s;
                int = Math.floor(int / 10000); p++;
            }
            return s + '元' + (Math.round(m*100)%100 === 0 ? '整' : '');
        })(sum);
    }

    // ==================== 拖拽和图片管理 ====================
    function makeDraggable(el) {
        let drag = false, sx, sy, sl, st;
        const onStart = (x, y) => {
            if (!el.src || el.style.display === 'none') return;
            drag = true; sx = x; sy = y;
            sl = parseFloat(el.style.left) || 0; st = parseFloat(el.style.top) || 0;
            el.classList.add('dragging');
        };
        const onMove = (x, y) => {
            if (!drag) return;
            el.style.left = (sl + x - sx) + 'px';
            el.style.top = (st + y - sy) + 'px';
            (el.id === 'brandImage' ? saveBrand : saveStamp)();
        };
        const onEnd = () => { drag = false; el.classList.remove('dragging'); };

        el.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
        el.addEventListener('touchstart', e => { e.preventDefault(); let t = e.touches[0]; onStart(t.clientX, t.clientY); }, {passive: false});
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchmove', e => { if (drag) { e.preventDefault(); let t = e.touches[0]; onMove(t.clientX, t.clientY); } }, {passive: false});
        window.addEventListener('touchend', onEnd);
    }
    function saveBrand() {
        let b = brandImage;
        if (b.src && b.style.display !== 'none') {
            localStorage.setItem('brandImg', b.src);
            localStorage.setItem('brandPos', JSON.stringify({l: b.style.left, t: b.style.top}));
            localStorage.setItem('brandW', brandWidth.value);
        }
    }
    function restoreBrand() {
        let src = localStorage.getItem('brandImg');
        if (src) {
            brandImage.src = src; brandImage.style.display = 'inline-block';
            let pos = JSON.parse(localStorage.getItem('brandPos') || '{}');
            brandImage.style.left = pos.l || '20px'; brandImage.style.top = pos.t || '0px';
            brandWidth.value = localStorage.getItem('brandW') || '120';
            brandImage.style.width = brandWidth.value + 'px';
            makeDraggable(brandImage);
        }
    }
    function saveStamp() {
        let s = companyStamp;
        if (s.src && s.style.display !== 'none') {
            localStorage.setItem('stampImg', s.src);
            localStorage.setItem('stampPos', JSON.stringify({l: s.style.left, t: s.style.top}));
            localStorage.setItem('stampW', stampWidth.value);
        }
    }
    function restoreStamp() {
        let src = localStorage.getItem('stampImg');
        if (src) {
            companyStamp.src = src; companyStamp.style.display = 'inline-block';
            let pos = JSON.parse(localStorage.getItem('stampPos') || '{}');
            companyStamp.style.left = pos.l || '150px'; companyStamp.style.top = pos.t || '100px';
            stampWidth.value = localStorage.getItem('stampW') || '150';
            companyStamp.style.width = stampWidth.value + 'px';
            makeDraggable(companyStamp);
        }
    }
    function initImageControls() {
        uploadBrandBtn.onclick = () => brandInput.click();
        brandInput.onchange = e => {
            let f = e.target.files[0];
            if (f && (f.type === 'image/png' || f.type === 'image/jpeg')) {
                let r = new FileReader();
                r.onload = ev => {
                    brandImage.src = ev.target.result; brandImage.style.display = 'inline-block';
                    brandImage.style.left = '20px'; brandImage.style.top = '0px';
                    brandWidth.value = '120'; brandImage.style.width = '120px';
                    saveBrand(); makeDraggable(brandImage);
                }; r.readAsDataURL(f);
            } else alert('仅支持PNG/JPG');
            brandInput.value = '';
        };
        removeBrandBtn.onclick = () => {
            brandImage.removeAttribute('src'); brandImage.style.display = 'none';
            localStorage.removeItem('brandImg'); localStorage.removeItem('brandPos');
        };
        applyBrandSize.onclick = () => { brandImage.style.width = brandWidth.value + 'px'; saveBrand(); };

        uploadStampBtn.onclick = () => stampInput.click();
        stampInput.onchange = e => {
            let f = e.target.files[0];
            if (f && (f.type === 'image/png' || f.type === 'image/jpeg')) {
                let r = new FileReader();
                r.onload = ev => {
                    companyStamp.src = ev.target.result; companyStamp.style.display = 'inline-block';
                    companyStamp.style.left = '150px'; companyStamp.style.top = '80px';
                    stampWidth.value = '150'; companyStamp.style.width = '150px';
                    saveStamp(); makeDraggable(companyStamp);
                }; r.readAsDataURL(f);
            } else alert('仅支持PNG/JPG');
            stampInput.value = '';
        };
        removeStampBtn.onclick = () => {
            companyStamp.removeAttribute('src'); companyStamp.style.display = 'none';
            localStorage.removeItem('stampImg'); localStorage.removeItem('stampPos');
        };
        applyStampSize.onclick = () => { companyStamp.style.width = stampWidth.value + 'px'; saveStamp(); };

        importFullImageBtn.onclick = () => fullImageInput.click();
        fullImageInput.onchange = e => {
            let f = e.target.files[0];
            if (f && f.type.match(/image\/(png|jpeg|webp)/)) {
                let r = new FileReader();
                r.onload = ev => {
                    let img = new Image(); img.onload = () => {
                        normalContent.style.display = 'none';
                        imageModeContainer.style.display = 'block';
                        controlBar.style.display = 'flex';
                        let canvas = imageCanvas, ctx = canvas.getContext('2d');
                        let scale = Math.min(1, (imageModeContainer.clientWidth-20) / img.width);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    }; img.src = ev.target.result;
                }; r.readAsDataURL(f);
            } else alert('仅支持图片文件');
            fullImageInput.value = '';
        };
        closeImageModeBtn.onclick = () => {
            normalContent.style.display = 'block';
            imageModeContainer.style.display = 'none';
            controlBar.style.display = 'none';
        };
        rotateLeftBtn.onclick = () => { /* 旋转功能可自行扩展 */ };
        rotateRightBtn.onclick = () => { /* 旋转功能可自行扩展 */ };

        restoreBrand(); restoreStamp();
    }

    // ==================== 导出 ====================
    async function cloneForExport(wmText) {
        let orig = document.getElementById('invoiceContainer');
        let clone = orig.cloneNode(true);
        clone.querySelector('#imageModeContainer').style.display = 'none';
        clone.querySelector('#imageControlBarExternal')?.remove();
        clone.querySelector('#normalContent').style.display = 'block';
        clone.querySelector('#editRemarkBtn')?.remove();
        if (wmText) {
            let wm = document.createElement('div');
            wm.className = 'watermark-layer';
            wm.style.backgroundImage = `url(${createWatermarkDataURL(wmText)})`;
            clone.style.position = 'relative';
            clone.appendChild(wm);
        }
        return clone;
    }
    async function exportAsImage() {
        let btn = saveAsImageBtn; btn.disabled = true; btn.innerText = '生成中...';
        try {
            let wm = await askWatermark();
            let clone = await cloneForExport(wm);
            clone.style.position = 'absolute'; clone.style.left = '-9999px'; document.body.appendChild(clone);
            await new Promise(r => setTimeout(r, 100));
            let canvas = await html2canvas(clone, { scale: 2, backgroundColor: '#fff', logging: false });
            document.body.removeChild(clone);
            let data = canvas.toDataURL('image/png');
            let name = `销售单_${invoiceNo.innerText}.png`;
            if (!saveFileNative(data, name, 'image/png')) {
                let a = document.createElement('a'); a.download = name; a.href = data; a.click();
            }
            showToast('图片已保存');
        } catch(e) { alert('出错：'+e.message); }
        finally { btn.disabled = false; btn.innerText = '📷 保存为图片'; }
    }
    async function exportPDF() {
        let btn = downloadPdfBtn; btn.disabled = true; btn.innerText = '生成PDF...';
        try {
            let wm = await askWatermark();
            let clone = await cloneForExport(wm);
            clone.style.position = 'absolute'; clone.style.left = '-9999px'; document.body.appendChild(clone);
            await new Promise(r => setTimeout(r, 100));
            let canvas = await html2canvas(clone, { scale: 2, backgroundColor: '#fff', logging: false });
            document.body.removeChild(clone);
            let { jsPDF } = window.jspdf;
            let pdf = new jsPDF('p', 'mm', 'a4');
            let w = pdf.internal.pageSize.getWidth();
            let ratio = w / canvas.width;
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, canvas.height * ratio);
            let name = `销售单_${invoiceNo.innerText}.pdf`;
            if (!saveFileNative(pdf.output('datauristring'), name, 'application/pdf')) {
                pdf.save(name);
            }
            showToast('PDF已保存');
        } catch(e) { alert('出错：'+e.message); }
        finally { btn.disabled = false; btn.innerText = '📄 下载 PDF'; }
    }
    async function printInvoice() {
        let btn = printBtn; btn.disabled = true; btn.innerText = '准备打印...';
        try {
            let wm = await askWatermark();
            let clone = await cloneForExport(wm);
            clone.style.position = 'absolute'; clone.style.left = '-9999px'; document.body.appendChild(clone);
            await new Promise(r => setTimeout(r, 100));
            let canvas = await html2canvas(clone, { scale: 2, backgroundColor: '#fff', logging: false });
            document.body.removeChild(clone);
            if (!printNative(canvas.toDataURL('image/png'))) {
                window.print();
            }
        } catch(e) { alert('出错：'+e.message); }
        finally { btn.disabled = false; btn.innerText = '🖨️ 打印销售单'; }
    }

    // ==================== 事件绑定 ====================
    function bindEvents() {
        addItemBtn.onclick = () => {
            let name = prodName.value.trim(); if (!name) { alert('输入商品名称'); return; }
            items.push({ name, unit: prodUnit.value || '个', qty: parseFloat(prodQty.value)||1, price: parseFloat(prodPrice.value)||0, remark: prodRemark.value });
            if (items.length === 1) selectedIndex = 0;
            renderTable(); prodName.value = ''; prodRemark.value = '';
        };
        clearAllBtn.onclick = () => { items = []; selectedIndex = -1; renderTable(); };
        moveUpBtn.onclick = () => { if (selectedIndex > 0) { [items[selectedIndex], items[selectedIndex-1]] = [items[selectedIndex-1], items[selectedIndex]]; selectedIndex--; renderTable(); } };
        moveDownBtn.onclick = () => { if (selectedIndex < items.length-1) { [items[selectedIndex], items[selectedIndex+1]] = [items[selectedIndex+1], items[selectedIndex]]; selectedIndex++; renderTable(); } };
        deleteSelectedBtn.onclick = () => { if (selectedIndex >= 0 && confirm('删除？')) { items.splice(selectedIndex, 1); selectedIndex = -1; renderTable(); } };
        loadEditBtn.onclick = () => {
            if (selectedIndex < 0) { alert('请先点击表格序号选中商品'); return; }
            let it = items[selectedIndex]; prodName.value = it.name; prodUnit.value = it.unit; prodQty.value = it.qty; prodPrice.value = it.price; prodRemark.value = it.remark || '';
        };
        saveEditBtn.onclick = () => {
            if (selectedIndex < 0) { alert('请先选中要修改的商品'); return; }
            items[selectedIndex] = { name: prodName.value, unit: prodUnit.value||'个', qty: parseFloat(prodQty.value)||1, price: parseFloat(prodPrice.value)||0, remark: prodRemark.value };
            renderTable(); showToast('已修改');
        };
        editRemarkBtn.onclick = () => { let v = prompt('编辑备注', remarkText.innerText); if (v !== null) remarkText.innerText = v || '—'; save(); };
        [editCompany, editPhone, editContact, editSigner, editCustomer].forEach(el => el.addEventListener('input', syncInfo));
        saveAsImageBtn.onclick = exportAsImage;
        downloadPdfBtn.onclick = exportPDF;
        printBtn.onclick = printInvoice;
        parseBtn.onclick = () => {
            let lines = batchRawInput.value.split('\n').filter(l => l.trim());
            let res = lines.map(l => {
                let m = l.match(/(.+?)\s+(\d+(?:\.\d+)?)\s*([\u4e00-\u9fa5]{1,3})?\s+(\d+)$/);
                if (m) return { name: m[1], qty: parseFloat(m[2]), unit: m[3] || '个', price: parseFloat(m[4]) };
                return null;
            }).filter(Boolean);
            parsePreview.innerHTML = res.length ? res.map(r => `<span class="preview-item">${r.name} ${r.qty}${r.unit} ¥${r.price}</span>`).join('') : '⚠️ 未识别';
            window._batchBuffer = res;
        };
        confirmAddBatchBtn.onclick = () => {
            if (!window._batchBuffer?.length) { alert('请先解析'); return; }
            window._batchBuffer.forEach(r => items.push({ ...r, remark: '' }));
            window._batchBuffer = null; parsePreview.innerHTML = '✅ 已添加'; renderTable();
        };
    }

    // 标签切换
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
        document.getElementById('tab-' + b.dataset.tab).classList.add('active-pane');
    });

    // 启动
    setMeta();
    bindEvents();
    initImageControls();
    if (!load()) { items = [{ name: '示例商品', unit: '个', qty: 1, price: 0, remark: '' }]; selectedIndex = 0; renderTable(); }
    else renderTable();
    if (isAndroidApp) { try { AndroidBridge.onPageLoaded(); } catch(e) {} }
</script>
</body>
</html>

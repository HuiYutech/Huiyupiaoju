<!DOCTYPE html>
<html lang="zh-CN" style="background:#eef2f5;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=794, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>慧语电子票据</title>
    <script src="js/html2canvas.min.js"></script>
    <script src="js/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
        body { background: #eef2f5; font-family: 'Segoe UI','PingFang SC','微软雅黑',Roboto,sans-serif; margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        #app-wrapper { width: 794px; transform-origin: top center; padding: 45px 0 30px 0; display: flex; flex-direction: column; align-items: center; margin: 0 auto; }
        .invoice-container, .control-panel, .btn-group { width: 794px; }
        .invoice-container { position: relative; background: white; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-radius: 20px; padding: 45px 7px 57px 7px; margin-bottom: 16px; overflow: visible; user-select: none; -webkit-user-select: none; }
        .normal-content { display: block; }
        .image-mode-container { display: none; background: #e8e8e8; border-radius: 8px; text-align: center; position: relative; overflow: hidden; min-height: 80px; margin: 0 auto; }
        .image-mode-container canvas { display: block; margin: 0 auto; max-width: 100%; max-height: 100%; object-fit: contain; }
        .image-mode-container .brand-overlay, .image-mode-container .company-stamp { position: absolute; z-index: 30; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; display: inline-block; }
        .image-control-bar-external { margin-top: 10px; display: none; justify-content: center; gap: 8px; background: rgba(0,0,0,0.65); padding: 6px 12px; border-radius: 40px; flex-wrap: wrap; }
        .image-control-bar-external button { background: white; border: none; padding: 5px 12px; border-radius: 32px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .watermark-layer { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10000; background-repeat:repeat; background-size:180px 180px; opacity:0.30; }
        .brand-overlay, .company-stamp { position: absolute; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
        .brand-overlay { z-index: 20; border-radius: 6px; opacity: 0.9; }
        .company-stamp { z-index: 9999; opacity: 0.85; display: none; }
        .brand-overlay.dragging, .company-stamp.dragging { cursor: grabbing; opacity: 0.7; }
        .control-panel { background: white; border-radius: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); margin-bottom: 12px; border:1px solid #e2edf2; overflow: hidden; }
        .tab-buttons { display: flex; background: #ffffff; border-bottom: 1px solid #e2edf2; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 8px; background: transparent; border: none; font-size: 14px; font-weight: 600; color: #4a627a; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: #2c7da0; border-bottom-color: #2c7da0; background: #f8fafc; }
        .tab-pane { display: none; padding: 24px; background: white; }
        .tab-pane.active-pane { display: block; }
        .info-edit-panel { display: flex; gap: 14px; }
        .info-field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .info-field label { font-size: 14px; font-weight: 600; color: #4a627a; }
        .info-field input { padding: 10px 14px; border-radius: 12px; border: 1px solid #cddfe7; font-size: 14px; width: 100%; }
        .add-goods-form { background: #fefcf5; border-radius: 20px; padding: 20px; border: 1px solid #e9e5d5; }
        .form-row { display: flex; gap: 12px; align-items: flex-end; }
        .form-field { flex: 1; min-width: 0; }
        .form-field label { font-size: 14px; font-weight: 600; color: #4a627a; display: block; margin-bottom: 4px; }
        .form-field input { width: 100%; padding: 10px 14px; border-radius: 32px; border: 1px solid #cddfe7; font-size: 14px; }
        .add-btn { background: #2c7da0; color: white; border: none; padding: 10px 24px; border-radius: 32px; font-weight: bold; cursor: pointer; height: 42px; display: inline-flex; align-items: center; white-space: nowrap; }
        .action-buttons { background: #fefcf5; border-radius: 20px; padding: 20px; border: 1px solid #e9e5d5; display: flex; gap: 20px; margin-top: 16px; }
        .btn-group-row { flex: 1; display: flex; flex-direction: column; gap: 12px; background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #edf2f7; }
        .btn-group-title { font-size: 14px; font-weight: 700; color: #2c7da0; border-left: 3px solid #2c7da0; padding-left: 10px; margin-bottom: 4px; }
        .btn-sm { background: #2c7da0; color: white; border: none; padding: 8px 20px; border-radius: 32px; font-weight: bold; cursor: pointer; }
        .btn-sm-danger { background: #bc6c25; }
        .action-icon-btn { background: #eef2f7; border: 1px solid #cbd5e1; color: #1e4663; font-size: 14px; font-weight: 600; padding: 6px 16px; border-radius: 32px; cursor: pointer; }
        .disabled { opacity: 0.5; pointer-events: none; }
        .table-wrapper { overflow-x: auto; border: 2px solid #1e2f3a; background: #fff; margin-top: 8px; }
        .sales-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-size: 14px; font-family: 'Consolas','PingFang SC', monospace; }
        .sales-table th, .sales-table td { border: 2px solid #1e2f3a; padding: 8px 6px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sales-table th { background: #e6eaef; font-weight: 800; }
        .sales-table th:nth-child(1) { width: 55px; } .sales-table th:nth-child(2) { width: auto; }
        .sales-table th:nth-child(3) { width: 60px; } .sales-table th:nth-child(4) { width: 70px; }
        .sales-table th:nth-child(5) { width: 100px; } .sales-table th:nth-child(6) { width: 90px; }
        .sales-table th:nth-child(7) { width: auto; }
        .clickable-seq { cursor: pointer; background: #f0f7ff; font-weight: 600; display: block; }
        .selected-row td:first-child { background: #cce5ff; font-weight: bold; }
        .selected-row { background: #f0f7ff; }
        .total-row { margin-top: 16px; background: #f8f9fc; padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .amount-chinese { font-weight: 700; color: #1e4663; }
        .remark-box { background: #f8f9fc; padding: 8px 15px; border-radius: 12px; margin: 14px 0; display: flex; align-items: flex-start; gap: 8px; }
        .remark-box strong { flex-shrink: 0; margin-top: 2px; }
        .remark-box span { white-space: normal; word-break: break-word; line-height: 1.5; }
        .remark-box button { flex-shrink: 0; margin-left: 6px; background: transparent; border: 1px solid #e2b87a; color: #b45f1b; border-radius: 40px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin: 20px 0 10px; }
        .btn-group button { border: none; color: white; font-size: 18px; font-weight: bold; padding: 14px 32px; border-radius: 56px; cursor: pointer; }
        #saveAsImageBtn { background: #2c7da0; }
        #downloadPdfBtn { background: #d9534f; }
        .toast-msg { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 22px; border-radius: 24px; z-index: 99999; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast-msg.show { opacity: 1; }
        @media print { body { background: white; } .btn-group, .control-panel { display: none; } }
    </style>
</head>
<body>
<div id="app-wrapper">
    <div class="invoice-container" id="invoiceContainer">
        <div class="normal-content" id="normalContent">
            <img id="brandImage" class="brand-overlay" src="" alt="品牌图" style="display:none;">
            <img id="companyStamp" class="company-stamp" src="" alt="公司章" style="display:none;">

            <div class="header-info" style="text-align:center; margin-bottom:12px;">
                <div class="company-title" style="font-size:24px;font-weight:800;color:#0b3b4f;">XX示例科技有限公司销售单</div>
                <div class="sub-title" style="font-size:13px;color:#2c3e50;">联系电话：100-000000 &nbsp;|&nbsp; 联系人：示例先生</div>
            </div>
            <div style="border-bottom:2px solid #1a4d6b; margin-bottom:12px;"></div>
            <div class="meta-row" style="display:flex;justify-content:space-between;background:#f4f7fa;padding:8px 15px;border-radius:12px;margin:12px 0;border:1px solid #bac8d3;">
                <div><strong>收货单位：</strong><span id="customerNameDisplay">XX示例公司</span></div>
                <div><strong>开单日期：</strong><span id="headerInvoiceDate"></span></div>
            </div>
            <div class="table-wrapper">
                <table class="sales-table" id="salesTable">
                    <thead><tr><th>序号</th><th>名称</th><th>单位</th><th>数量</th><th>单价(元)</th><th>金额(元)</th><th>备注/类别</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="total-row">
                <span><strong>合计(大写):</strong> <span id="amountCN" class="amount-chinese">零元整</span></span>
                <span style="font-size:20px;color:#c0392b;">￥ <span id="amountTotal">0.00</span></span>
            </div>
            <div class="remark-box" id="remarkBox">
                <strong>备 注：</strong>
                <span id="remarkText">示例交易内容，仅供参考。<button id="editRemarkBtn">✎ 编辑</button></span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:24px;border-top:2px solid #3c5a6f;padding-top:16px;">
                <span id="signerName">制单人：示例先生</span>
                <span style="font-size:12px;text-align:center;color:#4a5568;">本销售单盖章有效 | 电子单据与纸质同等效力</span>
                <span><strong>单据编号：</strong><span id="invoiceNo"></span></span>
            </div>
        </div>

        <div class="image-mode-container" id="imageModeContainer">
            <canvas id="imageCanvas"></canvas>
        </div>
        <div id="imageControlBarExternal" class="image-control-bar-external">
            <button id="rotateLeftBtn">↺ 左转90°</button>
            <button id="rotateRightBtn">↻ 右转90°</button>
            <button id="closeImageModeBtn" style="background:#d9534f;color:white;">✕ 关闭图片</button>
        </div>
    </div>

    <div class="control-panel" id="controlPanel">
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="basic">基本资料</button>
            <button class="tab-btn" data-tab="edit">添加删除</button>
            <button class="tab-btn" data-tab="image">商标管理</button>
            <button class="tab-btn" data-tab="batch">批量解析</button>
            <button class="tab-btn" data-tab="export">导出收据</button>
        </div>
        <div class="tab-pane active-pane" id="tab-basic">
            <div class="info-edit-panel">
                <div class="info-field"><label>🏢 公司名称</label><input id="editCompany" value="XX示例科技有限公司"></div>
                <div class="info-field"><label>📞 联系电话</label><input id="editPhone" value="100-000000"></div>
                <div class="info-field"><label>👤 联系人</label><input id="editContact" value="示例先生"></div>
                <div class="info-field"><label>✍️ 制单人</label><input id="editSigner" value="示例先生"></div>
                <div class="info-field"><label>🏪 收货单位</label><input id="editCustomer" value="XX示例公司"></div>
            </div>
        </div>
        <div class="tab-pane" id="tab-edit">
            <div class="add-goods-form">
                <div class="form-row">
                    <div class="form-field"><label>商品名称</label><input id="prodName" placeholder="请输入商品名称"></div>
                    <div class="form-field"><label>单位</label><input id="prodUnit" value="个"></div>
                    <div class="form-field"><label>数量</label><input type="number" id="prodQty" value="1" step="any" min="0.01"></div>
                    <div class="form-field"><label>单价(元)</label><input type="number" id="prodPrice" value="0.00" step="0.01" min="0"></div>
                </div>
                <div class="form-row" style="margin-top:8px;">
                    <div class="form-field"><label>备注</label><input id="prodRemark" placeholder="可选"></div>
                    <div class="form-field" style="flex:0 0 auto;"><button id="addItemBtn" class="add-btn">➕ 添加商品</button></div>
                </div>
            </div>
            <div class="action-buttons">
                <div class="btn-group-row"><div class="btn-group-title">✏️ 编辑当前选中商品</div><button id="loadEditBtn" class="action-icon-btn">📋 加载选中</button><button id="saveEditBtn" class="btn-sm">💾 保存修改</button></div>
                <div class="btn-group-row"><div class="btn-group-title">🔁 调整顺序</div><button id="moveUpBtn" class="action-icon-btn">↑ 上移</button><button id="moveDownBtn" class="action-icon-btn">↓ 下移</button></div>
                <div class="btn-group-row"><div class="btn-group-title">🗑️ 删除操作</div><button id="deleteSelectedBtn" class="action-icon-btn danger">删除选中</button><button id="clearAllBtn" class="btn-sm btn-sm-danger">清空全部</button></div>
            </div>
        </div>
        <div class="tab-pane" id="tab-image">
            <div style="margin-bottom:16px;font-weight:500;">📎 手指拖拽可移动图片，位置自动保存</div>
            <div style="display:flex;flex-direction:column;gap:20px;">
                <div style="background:#f9fafb;padding:16px 20px;border-radius:20px;border:1px solid #e2edf2;">
                    <div style="font-weight:600;margin-bottom:8px;">🏢 品牌图</div>
                    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
                        <button class="btn-sm" style="background:#5f6c7a;" onclick="document.getElementById('brandInput').click()">上传</button>
                        <button class="btn-sm" style="background:#bc6c25;" onclick="removeBrand()">移除</button>
                        <div style="display:flex;align-items:center;gap:8px;"><span>宽(px):</span><input type="number" id="brandWidth" value="120" step="10" min="30" max="400" style="width:70px;padding:4px;border-radius:20px;border:1px solid #cddfe7;"></div>
                        <button class="action-icon-btn" onclick="applyBrandSize()">应用</button>
                    </div>
                    <input type="file" id="brandInput" accept="image/*" style="display:none;" onchange="handleBrandUpload(this)">
                </div>
                <div style="background:#f9fafb;padding:16px 20px;border-radius:20px;border:1px solid #e2edf2;">
                    <div style="font-weight:600;margin-bottom:8px;">🖼️ 公司章</div>
                    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
                        <button class="btn-sm" style="background:#5f6c7a;" onclick="document.getElementById('stampInput').click()">上传</button>
                        <button class="btn-sm" style="background:#bc6c25;" onclick="removeStamp()">移除</button>
                        <div style="display:flex;align-items:center;gap:8px;"><span>宽(px):</span><input type="number" id="stampWidth" value="150" step="10" min="50" max="500" style="width:70px;padding:4px;border-radius:20px;border:1px solid #cddfe7;"></div>
                        <button class="action-icon-btn" onclick="applyStampSize()">应用</button>
                    </div>
                    <input type="file" id="stampInput" accept="image/*" style="display:none;" onchange="handleStampUpload(this)">
                </div>
                <div style="background:#eef7ff;padding:16px 20px;border-radius:20px;border:2px dashed #2c7da0;">
                    <div style="font-weight:600;">🖼️ 导入背景图（A4容器，旋转自适应）</div>
                    <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:8px;">
                        <button class="btn-sm" style="background:#2c7da0;" onclick="document.getElementById('fullImageInput').click()">📂 导入图片</button>
                    </div>
                    <input type="file" id="fullImageInput" accept="image/*" style="display:none;" onchange="handleFullImageUpload(this)">
                </div>
            </div>
            <div style="margin-top:12px;font-size:11px;color:#888;">💡 点击移除会清除缓存。</div>
        </div>
        <div class="tab-pane" id="tab-batch">
            <div style="background:#f9fafb;border-radius:20px;padding:20px;border:1px solid #e2edf2;">
                <div style="font-weight:700;font-size:16px;color:#1e4663;margin-bottom:16px;">🧠 精准批量解析</div>
                <textarea id="batchRawInput" rows="5" style="width:100%;border-radius:16px;border:1px solid #cbd5e1;padding:14px;font-family:monospace;font-size:14px;min-height:120px;" placeholder="示例格式（每行一个商品，可含多种写法）：&#10;智能平板 3 台 2499&#10;网线 5根 2.8&#10;鼠标 10 个 25&#10;键盘 2个 160 (自动算单价80)&#10;服务费 1 次 200&#10;水晶头 100个 0.5&#10;合计大写自动计算"></textarea>
                <div id="parsePreview" style="margin-top:16px;max-height:200px;overflow-y:auto;background:white;border-radius:16px;padding:12px;border:1px solid #e2e8f0;"></div>
                <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:16px;">
                    <button id="parseBtn" style="background:transparent;border:1px solid #2c7da0;color:#2c7da0;padding:6px 16px;border-radius:32px;font-weight:bold;cursor:pointer;" onclick="parseBatch()">🔍 智能解析预览</button>
                    <button id="confirmAddBatchBtn" class="btn-sm" onclick="confirmAddBatch()">✓ 确认添加全部</button>
                </div>
            </div>
        </div>
        <div class="tab-pane" id="tab-export">
            <div style="display:flex; justify-content:center; gap:40px; padding:20px 0;">
                <button id="saveAsImageBtn" onclick="exportImage()" style="border:none; color:white; font-size:18px; font-weight:bold; padding:14px 32px; border-radius:56px; cursor:pointer; background:#2c7da0;">📷 保存为图片</button>
                <button id="downloadPdfBtn" onclick="exportPDF()" style="border:none; color:white; font-size:18px; font-weight:bold; padding:14px 32px; border-radius:56px; cursor:pointer; background:#d9534f;">📄 下载 PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
    const appWrapper = document.getElementById('app-wrapper');
    const brandImage = document.getElementById('brandImage');
    const companyStamp = document.getElementById('companyStamp');
    const normalContent = document.getElementById('normalContent');
    const imageModeContainer = document.getElementById('imageModeContainer');
    const imageCanvas = document.getElementById('imageCanvas');
    const controlBar = document.getElementById('imageControlBarExternal');
    let originalImage = null, rotation = 0;

    function updateScalable() {
        const meta = document.querySelector('meta[name="viewport"]');
        if (window.innerWidth >= 794) {
            meta.content = 'width=794, initial-scale=1.0, user-scalable=no, viewport-fit=cover';
        } else {
            meta.content = 'width=794, initial-scale=1.0, user-scalable=yes, viewport-fit=cover';
        }
    }
    window.addEventListener('resize', updateScalable);
    window.addEventListener('load', updateScalable);

    function resizeApp() {
        const w = window.innerWidth;
        const scale = Math.min(1, w / 794);
        appWrapper.style.transform = `scale(${scale})`;
        appWrapper.style.marginBottom = `-${appWrapper.offsetHeight * (1 - scale)}px`;
    }
    window.addEventListener('resize', resizeApp);
    window.addEventListener('orientationchange', () => setTimeout(resizeApp, 50));
    window.addEventListener('load', () => setTimeout(resizeApp, 30));

    function showToast(msg) {
        if (typeof AndroidBridge !== 'undefined' && AndroidBridge) {
            try { AndroidBridge.showToast(msg); } catch(e) {}
        }
        let toast = document.getElementById('globalToast');
        if (!toast) {
            toast = document.createElement('div'); toast.id = 'globalToast'; toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg; toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }
    function nativeSave(b64, name, mime) {
        if (typeof AndroidBridge !== 'undefined' && AndroidBridge) {
            try { AndroidBridge.saveFile(b64, name, mime); return true; } catch(e) {}
        }
        return false;
    }

    let items = [], selectedIndex = -1;
    const STORAGE_KEY = 'invoiceData_v2';
    const UNITS = new Set(['个','台','套','根','件','只','条','支','箱','包','瓶','盒','桶','双','对','米','千克','公斤','克','升','毫升','袋','卷','组','部','块','片','张','把','粒','罐','打','份','册','本','辆','架','顶','副','串','捆','扎','排','座','栋','扇','盏','枚','轴','码','英尺','英寸','厘米','毫米','GB','TB']);

    function saveData() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({
            items, selectedIndex,
            company: document.getElementById('editCompany').value,
            phone: document.getElementById('editPhone').value,
            contact: document.getElementById('editContact').value,
            signer: document.getElementById('editSigner').value,
            customer: document.getElementById('editCustomer').value,
            remark: document.getElementById('remarkText').innerText.replace(/✎ 编辑/g,'').trim()
        })); } catch(e) {}
    }
    function loadData() {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            let d = JSON.parse(raw);
            items = d.items || []; selectedIndex = d.selectedIndex ?? -1;
            document.getElementById('editCompany').value = d.company || 'XX示例科技有限公司';
            document.getElementById('editPhone').value = d.phone || '100-000000';
            document.getElementById('editContact').value = d.contact || '示例先生';
            document.getElementById('editSigner').value = d.signer || '示例先生';
            document.getElementById('editCustomer').value = d.customer || 'XX示例公司';
            updateRemark(d.remark || '示例交易内容，仅供参考。');
            syncInfo(); renderTable(); return true;
        } catch(e) { return false; }
    }
    function updateRemark(text) {
        const span = document.getElementById('remarkText');
        span.innerHTML = `${text}<button id="editRemarkBtn">✎ 编辑</button>`;
        document.getElementById('editRemarkBtn').onclick = () => {
            let v = prompt('编辑备注', text);
            if (v !== null) updateRemark(v.trim() || '—');
            saveData();
        };
    }
    function syncInfo() {
        document.querySelector('.company-title').innerText = document.getElementById('editCompany').value || '销售单';
        document.querySelector('.sub-title').innerHTML = `联系电话：${document.getElementById('editPhone').value} &nbsp;|&nbsp; 联系人：${document.getElementById('editContact').value}`;
        document.getElementById('signerName').innerText = '制单人：' + document.getElementById('editSigner').value;
        document.getElementById('customerNameDisplay').innerText = document.getElementById('editCustomer').value || '';
        saveData();
    }
    function setInvoiceMeta() {
        let d = new Date();
        let y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
        document.getElementById('headerInvoiceDate').innerText = `${y}-${m}-${day} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        document.getElementById('invoiceNo').innerText = `XS-${y}${m}${day}-${Math.floor(Math.random()*10000).toString().padStart(4,'0')}`;
    }
    function convertCurrency(money) {
        if (isNaN(money)) return '零元整';
        let num = Math.round(money*100)/100;
        let digit = '零壹贰叁肆伍陆柒捌玖', units = ['','拾','佰','仟'], big = ['元','万','亿'];
        let s = '', p = 0, int = Math.floor(num);
        while (int > 0) {
            let part = int % 10000, partStr = '', q = 0, tmp = part;
            while (tmp > 0) { let cur = tmp % 10; partStr = (cur ? digit[cur] + units[q] : (partStr && partStr[0]!=='零' ? '零'+partStr : partStr)); tmp = Math.floor(tmp/10); q++; }
            if (part < 1000 && p > 0 && s && s[0]!=='零') partStr = '零' + partStr;
            s = partStr + (p===0?'':big[p]) + s;
            int = Math.floor(int/10000); p++;
        }
        return s + '元' + (Math.round(num*100)%100 === 0 ? '整' : '');
    }
    function renderTable() {
        let tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (!items.length) {
            selectedIndex = -1;
            let row = tbody.insertRow(); row.insertCell().colSpan = 7;
            row.cells[0].style.textAlign = 'center'; row.cells[0].innerText = '✨ 暂无商品';
            updateTotal(); saveData(); return;
        }
        items.forEach((it, idx) => {
            let row = tbody.insertRow();
            if (idx === selectedIndex) row.classList.add('selected-row');
            let cell = row.insertCell();
            cell.innerHTML = `<span class="clickable-seq">${idx+1}</span>`;
            cell.querySelector('.clickable-seq').onclick = () => { selectedIndex = idx; renderTable(); };
            row.insertCell().innerText = it.name;
            row.insertCell().innerText = it.unit;
            row.insertCell().innerText = it.qty;
            row.insertCell().innerText = it.price.toFixed(2);
            row.insertCell().innerText = (it.qty * it.price).toFixed(2);
            row.insertCell().innerText = it.remark || '';
        });
        updateTotal(); saveData();
        if (companyStamp.style.display !== 'none' && companyStamp.src) positionStampAtInvoiceNo();
    }
    function updateTotal() {
        let sub = items.reduce((s, i) => s + i.qty * i.price, 0);
        document.getElementById('amountTotal').innerText = sub.toFixed(2);
        document.getElementById('amountCN').innerHTML = convertCurrency(sub);
    }

    // 商品操作
    document.getElementById('addItemBtn').onclick = () => {
        let n = document.getElementById('prodName').value.trim(); if (!n) return alert('请输入商品名称');
        items.push({ name: n, unit: document.getElementById('prodUnit').value||'个',
            qty: parseFloat(document.getElementById('prodQty').value)||1,
            price: parseFloat(document.getElementById('prodPrice').value)||0,
            remark: document.getElementById('prodRemark').value });
        if (items.length === 1) selectedIndex = 0;
        renderTable(); document.getElementById('prodName').value=''; document.getElementById('prodRemark').value='';
    };
    document.getElementById('clearAllBtn').onclick = () => { items=[]; selectedIndex=-1; renderTable(); };
    document.getElementById('moveUpBtn').onclick = () => { if (selectedIndex>0) { [items[selectedIndex-1], items[selectedIndex]] = [items[selectedIndex], items[selectedIndex-1]]; selectedIndex--; renderTable(); } };
    document.getElementById('moveDownBtn').onclick = () => { if (selectedIndex<items.length-1) { [items[selectedIndex+1], items[selectedIndex]] = [items[selectedIndex], items[selectedIndex+1]]; selectedIndex++; renderTable(); } };
    document.getElementById('deleteSelectedBtn').onclick = () => { if (selectedIndex>=0 && confirm('删除？')) { items.splice(selectedIndex,1); selectedIndex=-1; renderTable(); } };
    document.getElementById('loadEditBtn').onclick = () => {
        if (selectedIndex<0) { alert('请先点击序号选中商品'); return; }
        let it = items[selectedIndex];
        document.getElementById('prodName').value = it.name;
        document.getElementById('prodUnit').value = it.unit;
        document.getElementById('prodQty').value = it.qty;
        document.getElementById('prodPrice').value = it.price;
        document.getElementById('prodRemark').value = it.remark || '';
    };
    document.getElementById('saveEditBtn').onclick = () => {
        if (selectedIndex<0) { alert('请先选中商品'); return; }
        items[selectedIndex] = {
            name: document.getElementById('prodName').value,
            unit: document.getElementById('prodUnit').value||'个',
            qty: parseFloat(document.getElementById('prodQty').value)||1,
            price: parseFloat(document.getElementById('prodPrice').value)||0,
            remark: document.getElementById('prodRemark').value
        };
        renderTable();
    };
    ['editCompany','editPhone','editContact','editSigner','editCustomer'].forEach(id => {
        document.getElementById(id).addEventListener('input', syncInfo);
    });

    // 图片拖拽与存储
    function makeDraggable(el) {
        if (!el) return;
        let drag=false, sx, sy, sl, st;
        const start = (x,y) => {
            if (!el.src || el.style.display==='none') return;
            drag=true; sx=x; sy=y;
            sl=parseFloat(el.style.left)||0; st=parseFloat(el.style.top)||0;
            el.classList.add('dragging');
        };
        const move = (x,y) => {
            if (!drag) return;
            el.style.left = (sl + x - sx) + 'px';
            el.style.top = (st + y - sy) + 'px';
            if (el===brandImage) saveBrand(); else if (el===companyStamp) saveStamp();
        };
        const end = () => { drag=false; el.classList.remove('dragging'); };
        el.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX, e.clientY); });
        el.addEventListener('touchstart', e => { e.preventDefault(); let t=e.touches[0]; start(t.clientX, t.clientY); }, {passive:false});
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', end);
        window.addEventListener('touchmove', e => { if(drag) { e.preventDefault(); let t=e.touches[0]; move(t.clientX, t.clientY); } }, {passive:false});
        window.addEventListener('touchend', end);
    }
    function saveBrand() {
        if (brandImage.src && brandImage.style.display!=='none') {
            localStorage.setItem('brandImg', brandImage.src);
            localStorage.setItem('brandPos', JSON.stringify({l: brandImage.style.left, t: brandImage.style.top}));
            localStorage.setItem('brandW', document.getElementById('brandWidth').value);
        }
    }
    function restoreBrand() {
        let src = localStorage.getItem('brandImg');
        if (src) {
            brandImage.src = src; brandImage.style.display = 'inline-block';
            let pos = JSON.parse(localStorage.getItem('brandPos')||'{}');
            brandImage.style.left = pos.l || '20px'; brandImage.style.top = pos.t || '0px';
            document.getElementById('brandWidth').value = localStorage.getItem('brandW')||'120';
            brandImage.style.width = document.getElementById('brandWidth').value + 'px';
            makeDraggable(brandImage);
        }
    }
    function saveStamp() {
        if (companyStamp.src && companyStamp.style.display!=='none') {
            localStorage.setItem('stampImg', companyStamp.src);
            localStorage.setItem('stampPos', JSON.stringify({l: companyStamp.style.left, t: companyStamp.style.top}));
            localStorage.setItem('stampW', document.getElementById('stampWidth').value);
        }
    }
    function positionStampAtInvoiceNo() {
        const invoiceNoEl = document.getElementById('invoiceNo');
        if (!invoiceNoEl || !companyStamp) return;
        const rect = invoiceNoEl.getBoundingClientRect();
        const containerRect = document.getElementById('invoiceContainer').getBoundingClientRect();
        const stampWidth = parseFloat(companyStamp.style.width) || 150;
        const centerX = rect.left + rect.width/2 - containerRect.left - stampWidth/2;
        const centerY = rect.top + rect.height/2 - containerRect.top - stampWidth/2;
        companyStamp.style.left = Math.max(0, centerX) + 'px';
        companyStamp.style.top = Math.max(0, centerY) + 'px';
    }
    function restoreStamp() {
        let src = localStorage.getItem('stampImg');
        if (src) {
            companyStamp.src = src; companyStamp.style.display = 'inline-block';
            let pos = JSON.parse(localStorage.getItem('stampPos')||'{}');
            companyStamp.style.left = pos.l || '150px'; companyStamp.style.top = pos.t || '80px';
            if (!pos.l) positionStampAtInvoiceNo();
            document.getElementById('stampWidth').value = localStorage.getItem('stampW')||'150';
            companyStamp.style.width = document.getElementById('stampWidth').value + 'px';
            makeDraggable(companyStamp);
        }
    }

    function placeOverlayInContainer(el) {
        if (imageModeContainer.style.display === 'block') {
            if (el.parentNode !== imageModeContainer) {
                imageModeContainer.appendChild(el);
                makeDraggable(el);
            }
            const cw = imageModeContainer.clientWidth;
            const ch = imageModeContainer.clientHeight;
            const elW = parseFloat(el.style.width) || 120;
            el.style.left = (cw/2 - elW/2) + 'px';
            el.style.top = (ch/2 - elW/2) + 'px';
        }
    }
    function handleBrandUpload(input) {
        let f = input.files[0];
        if (f && (f.type==='image/png'||f.type==='image/jpeg')) {
            let reader = new FileReader();
            reader.onload = ev => {
                brandImage.src = ev.target.result;
                brandImage.style.display = 'inline-block';
                brandImage.style.left = '20px'; brandImage.style.top = '0px';
                document.getElementById('brandWidth').value = '120';
                brandImage.style.width = '120px';
                saveBrand(); makeDraggable(brandImage);
                placeOverlayInContainer(brandImage);
            }; reader.readAsDataURL(f);
        } else alert('仅支持PNG/JPG');
        input.value = '';
    }
    function removeBrand() {
        brandImage.src = ''; brandImage.style.display = 'none';
        localStorage.removeItem('brandImg'); localStorage.removeItem('brandPos');
    }
    function applyBrandSize() {
        brandImage.style.width = document.getElementById('brandWidth').value + 'px';
        saveBrand(); placeOverlayInContainer(brandImage);
    }
    function handleStampUpload(input) {
        let f = input.files[0];
        if (f && (f.type==='image/png'||f.type==='image/jpeg')) {
            let reader = new FileReader();
            reader.onload = ev => {
                companyStamp.src = ev.target.result;
                companyStamp.style.display = 'inline-block';
                document.getElementById('stampWidth').value = '150';
                companyStamp.style.width = '150px';
                positionStampAtInvoiceNo();
                saveStamp(); makeDraggable(companyStamp);
                placeOverlayInContainer(companyStamp);
            }; reader.readAsDataURL(f);
        } else alert('仅支持PNG/JPG');
        input.value = '';
    }
    function removeStamp() {
        companyStamp.src = ''; companyStamp.style.display = 'none';
        localStorage.removeItem('stampImg'); localStorage.removeItem('stampPos');
    }
    function applyStampSize() {
        companyStamp.style.width = document.getElementById('stampWidth').value + 'px';
        saveStamp(); placeOverlayInContainer(companyStamp);
    }

    // 背景图旋转与居中
    function redrawCanvas() {
        if (!originalImage) return;
        const canvas = imageCanvas, ctx = canvas.getContext('2d');
        const w = originalImage.width, h = originalImage.height;
        const rad = rotation * Math.PI / 180;
        const cos = Math.abs(Math.cos(rad)), sin = Math.abs(Math.sin(rad));
        const newW = w * cos + h * sin, newH = w * sin + h * cos;
        let cw = imageModeContainer.clientWidth || 794;
        let ch = (cw / newW) * newH;
        canvas.width = cw; canvas.height = ch;
        ctx.fillStyle = '#e8e8e8'; ctx.fillRect(0,0,cw,ch);
        const scale = Math.min(cw/newW, ch/newH);
        ctx.save(); ctx.translate(cw/2, ch/2); ctx.rotate(rad);
        ctx.drawImage(originalImage, -w*scale/2, -h*scale/2, w*scale, h*scale);
        ctx.restore();
        [brandImage, companyStamp].forEach(el => {
            if (el.style.display !== 'none' && el.parentNode === imageModeContainer) {
                const elW = parseFloat(el.style.width) || 120;
                el.style.left = (cw/2 - elW/2) + 'px';
                el.style.top = (ch/2 - elW/2) + 'px';
            }
        });
    }
    function handleFullImageUpload(input) {
        const f = input.files[0];
        if (f && f.type.match(/image\/(png|jpeg|webp)/)) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img; rotation = 0;
                    normalContent.style.display = 'none';
                    imageModeContainer.style.display = 'block';
                    controlBar.style.display = 'flex';
                    [brandImage, companyStamp].forEach(el => {
                        if (el.parentNode !== imageModeContainer) {
                            imageModeContainer.appendChild(el);
                            makeDraggable(el);
                        }
                    });
                    redrawCanvas();
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(f);
        } else alert('仅支持图片文件');
        input.value = '';
    }
    document.getElementById('rotateLeftBtn').onclick = () => { rotation -= 90; redrawCanvas(); };
    document.getElementById('rotateRightBtn').onclick = () => { rotation += 90; redrawCanvas(); };
    document.getElementById('closeImageModeBtn').onclick = () => {
        normalContent.style.display = 'block';
        imageModeContainer.style.display = 'none';
        controlBar.style.display = 'none';
        [brandImage, companyStamp].forEach(el => {
            if (el.style.display !== 'none') {
                document.getElementById('invoiceContainer').appendChild(el);
                makeDraggable(el);
            }
        });
        originalImage = null; imageCanvas.width = 0; imageCanvas.height = 0;
        location.reload();
    };

    // 批量解析
    function parseBatch() {
        let lines = document.getElementById('batchRawInput').value.split('\n').filter(l=>l.trim());
        let res = lines.map(line => {
            let m = line.match(/(.+?)\s+(\d+(?:\.\d+)?)\s*([\u4e00-\u9fa5]{1,3})?\s+(\d+(?:\.\d{1,2})?)$/);
            return m ? { name:m[1], qty:parseFloat(m[2]), unit:m[3]||'个', price:parseFloat(m[4]) } : null;
        }).filter(Boolean);
        document.getElementById('parsePreview').innerHTML = res.length ? res.map(r => `<span style="background:#f1f5f9;border-radius:24px;padding:4px 12px;margin:4px;display:inline-block;">✅ ${r.name} ${r.qty}${r.unit} ¥${r.price.toFixed(2)}</span>`).join('') : '⚠️ 未识别';
        window._batch = res;
    }
    function confirmAddBatch() {
        if (!window._batch?.length) { alert('请先解析'); return; }
        window._batch.forEach(p => items.push({...p, remark:''}));
        window._batch = []; document.getElementById('parsePreview').innerHTML='✅ 已添加'; renderTable();
    }

    // 导出（水印16px，更清晰）
    function getExportClone(wmText) {
        let orig = document.getElementById('invoiceContainer');
        let clone = orig.cloneNode(true);
        clone.querySelectorAll('.selected-row').forEach(r => r.classList.remove('selected-row'));
        clone.style.width = '794px'; clone.style.position = 'absolute';
        clone.style.left = '-9999px'; clone.style.top = '0'; clone.style.transform = 'none';
        clone.querySelector('#imageModeContainer').style.display = 'none';
        clone.querySelector('#imageControlBarExternal')?.remove();
        clone.querySelector('#normalContent').style.display = 'block';
        clone.querySelector('#editRemarkBtn')?.remove();
        if (wmText) {
            let wm = document.createElement('div'); wm.className = 'watermark-layer';
            let c = document.createElement('canvas'); c.width=800; c.height=800;
            let ctx = c.getContext('2d');
            ctx.font='bold 16px "PingFang SC","微软雅黑"'; ctx.fillStyle='#7f8c8d';
            ctx.translate(400,400); ctx.rotate(-25 * Math.PI / 180);
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(wmText,0,0);
            wm.style.backgroundImage = `url(${c.toDataURL()})`;
            clone.appendChild(wm);
        }
        return clone;
    }
    function askWatermark() {
        return new Promise(resolve => {
            if (!confirm('是否添加防伪水印？')) { resolve(null); return; }
            let def = localStorage.getItem('lastWatermark_v2') || 'XX示例水印';
            let inp = prompt('水印文字(最多18字)', def);
            if (inp === null) { resolve(null); return; }
            let t = inp.trim();
            if (!t) { alert('水印内容不能为空'); resolve(null); return; }
            if (t.length > 18) { alert('水印文字超过18个字符，请重新输入。'); resolve(null); return; }
            localStorage.setItem('lastWatermark_v2', t);
            resolve(t);
        });
    }
    function getTimestamp() {
        let now = new Date();
        return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
    }
    async function exportImage() {
        let btn = document.getElementById('saveAsImageBtn'); btn.disabled = true; btn.innerText = '生成中...';
        try {
            let wm = await askWatermark();
            let clone = getExportClone(wm);
            document.body.appendChild(clone);
            await new Promise(r => setTimeout(r, 150));
            let canvas = await html2canvas(clone, { scale:2, backgroundColor:'#fff', logging:false });
            document.body.removeChild(clone);
            let data = canvas.toDataURL('image/png');
            let company = document.getElementById('editCompany').value.trim() || '销售单';
            company = company.replace(/\s+/g, '_');
            let name = `${company}_${getTimestamp()}.png`;
            if (!nativeSave(data, name, 'image/png')) {
                let a = document.createElement('a'); a.download = name; a.href = data; a.click();
                showToast('已使用浏览器下载');
            } else showToast('图片已保存');
        } catch(e) { alert('出错'); }
        finally { btn.disabled = false; btn.innerText = '📷 保存为图片'; }
    }
    async function exportPDF() {
        let btn = document.getElementById('downloadPdfBtn'); btn.disabled = true; btn.innerText = '生成PDF...';
        try {
            let wm = await askWatermark();
            let clone = getExportClone(wm);
            document.body.appendChild(clone);
            await new Promise(r => setTimeout(r, 150));
            let canvas = await html2canvas(clone, { scale:2, backgroundColor:'#fff' });
            document.body.removeChild(clone);
            let { jsPDF } = window.jspdf;
            let pdf = new jsPDF('p','mm','a4');
            let w = pdf.internal.pageSize.getWidth();
            let ratio = w / canvas.width;
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0,0,w,canvas.height*ratio);
            let company = document.getElementById('editCompany').value.trim() || '销售单';
            company = company.replace(/\s+/g, '_');
            let name = `${company}_${getTimestamp()}.pdf`;
            if (!nativeSave(pdf.output('datauristring'), name, 'application/pdf')) {
                pdf.save(name);
                showToast('已使用浏览器下载');
            } else showToast('PDF已保存');
        } catch(e) { alert('出错'); }
        finally { btn.disabled = false; btn.innerText = '📄 下载 PDF'; }
    }

    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
        document.getElementById('tab-' + b.dataset.tab).classList.add('active-pane');
    }));

    setInvoiceMeta();
    restoreBrand();
    restoreStamp();
    updateRemark('示例交易内容，仅供参考。');
    if (!loadData()) {
        items = [{ name: '示例商品', unit: '个', qty: 1, price: 10.00, remark: '类型A' }];
        selectedIndex = 0; renderTable();
    } else renderTable();
    resizeApp();
    updateScalable();
    if (typeof AndroidBridge !== 'undefined' && AndroidBridge) {
        try { AndroidBridge.requestStoragePermission(); } catch(e) {}
    }
</script>
</body>
